services:
  ocr-service:
    build:
      context: .
      dockerfile: services/ocr-service/Dockerfile
    restart: unless-stopped
    expose:
      - "8090"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    env_file:
      - path: .env
      - path: .env.local
        required: false
    command: ["npm", "run", "migrate"]
    restart: "no"

  sync-service:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
      - path: .env.local
        required: false
    command: ["npm", "run", "-w", "@smp/sync-service", "start"]
    restart: unless-stopped

  order-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
      - path: .env.local
        required: false
    command: ["npm", "run", "-w", "@smp/order-dispatcher", "start"]
    restart: unless-stopped

  matching-api:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
      ocr-service:
        condition: service_started
    env_file:
      - path: .env
      - path: .env.local
        required: false
    environment:
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr-service:8090/ocr}
    expose:
      - "8080"
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      matching-api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
