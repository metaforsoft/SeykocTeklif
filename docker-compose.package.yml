services:
  matching_db:
    image: postgres:16
    container_name: matching_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${MATCH_PG_DB}
      POSTGRES_USER: ${MATCH_PG_USER}
      POSTGRES_PASSWORD: ${MATCH_PG_PASSWORD}
    volumes:
      - matching_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MATCH_PG_USER} -d ${MATCH_PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ocr-service:
    build:
      context: .
      dockerfile: services/ocr-service/Dockerfile
    restart: unless-stopped
    expose:
      - "8090"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    depends_on:
      matching_db:
        condition: service_healthy
    env_file:
      - path: .env
      - path: .env.local
        required: false
    command: ["npm", "run", "migrate"]
    restart: "no"

  sync-service:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    depends_on:
      matching_db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
      - path: .env.local
        required: false
    command: ["npm", "run", "-w", "@smp/sync-service", "start"]
    restart: unless-stopped

  order-dispatcher:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    depends_on:
      matching_db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - path: .env
      - path: .env.local
        required: false
    command: ["npm", "run", "-w", "@smp/order-dispatcher", "start"]
    restart: unless-stopped

  matching-api:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    depends_on:
      matching_db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ocr-service:
        condition: service_started
    env_file:
      - path: .env
      - path: .env.local
        required: false
    environment:
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr-service:8090/ocr}
    expose:
      - "8080"
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      matching-api:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  matching_db_data:
